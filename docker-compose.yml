version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: revel_mini_erp_db
    environment:
      POSTGRES_USER: revel_user
      POSTGRES_PASSWORD: revel_password
      POSTGRES_DB: revel_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U revel_user -d revel_erp" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
